spring.application.name=site-expense-manager

spring.datasource.url=jdbc:mysql://localhost:3306/expense_manager_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

#  JWT
# IMPORTANT: override this with a real secret via env var in production, don't commit a real one.
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-of-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

#  Business rules
app.food-rate-per-person=${FOOD_RATE_PER_PERSON:330}
app.payout-cycle-days=${PAYOUT_CYCLE_DAYS:2}

# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}



